server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript
        image/svg+xml;

    # Caché larga para assets con hash (CSS, JS, imágenes)
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Sin caché para HTML y JSON (se actualizan con cada deploy)
    location ~* \.(html|json)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Servir ads.txt en la raíz del dominio (requerido por AdSense)
    location = /ads.txt {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # Proxy hacia la API (Node/Express en el contenedor juegos-api)
    location /api/ {
        proxy_pass         http://juegos-api:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    # Ruta principal
    location / {
        try_files $uri $uri/ =404;
    }

    # Ocultar versión de nginx
    server_tokens off;
}
