<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 170">
  <rect width="400" height="170" fill="#ff7200"/>
  <!-- laberinto simplificado -->
  <rect x="50"  y="30"  width="140" height="110" rx="4" fill="none" stroke="#fff" stroke-width="4"/>
  <!-- muros internos -->
  <line x1="70"  y1="30"  x2="70"  y2="90"  stroke="#fff" stroke-width="4"/>
  <line x1="70"  y1="90"  x2="130" y2="90"  stroke="#fff" stroke-width="4"/>
  <line x1="130" y1="50"  x2="130" y2="90"  stroke="#fff" stroke-width="4"/>
  <line x1="110" y1="90"  x2="110" y2="140" stroke="#fff" stroke-width="4"/>
  <line x1="90"  y1="110" x2="150" y2="110" stroke="#fff" stroke-width="4"/>
  <!-- personaje (inicio) -->
  <circle cx="60" cy="45" r="10" fill="#ffe135" stroke="#111" stroke-width="2"/>
  <!-- meta (salida) -->
  <text x="155" y="148" font-size="20" fill="#00c853" stroke="#111" stroke-width="1">EXIT</text>
  <!-- flecha indicadora -->
  <path d="M230 85 L330 85" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <polygon points="330,75 350,85 330,95" fill="#fff" stroke="#111" stroke-width="2"/>
  <text x="290" y="75" font-family="Arial Black,sans-serif" font-size="13" text-anchor="middle" fill="#111">¡Escapa!</text>
  <text x="200" y="165" font-family="Arial Black,sans-serif" font-size="16" text-anchor="middle" fill="#fff" stroke="#111" stroke-width="1">LABERINTO</text>
</svg>
